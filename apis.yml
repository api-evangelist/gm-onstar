aid: gm-onstar
name: GM OnStar
description: >-
  GM OnStar is General Motors' connected vehicle services platform, originally
  launched in 1996 as an in-vehicle safety, security, and concierge service and
  since extended into a commercial data platform under OnStar Business
  Solutions. The OnStar Business Solutions API and Data Services product
  delivers near-real-time embedded telematics straight from properly equipped
  2015-model-year-or-newer GM vehicles — Chevrolet, Buick, GMC, and Cadillac —
  without aftermarket hardware, exposing vehicle location, speed, ignition
  status, odometer, fuel level, EV state-of-charge and charging status, tire
  pressure, seatbelt status, diagnostic trouble codes, and driver-behavior
  events such as hard brake and hard acceleration. The product is packaged
  into tiered plans (commonly referenced as API Starter and API Pro) and is
  distributed primarily through OnStar's enterprise channel under the GM
  Envolve commercial brand, plus integrations with fleet management providers
  including Samsara, Geotab, Wheels, Verizon Connect, and other approved
  telematic service providers. There is no public self-serve developer portal
  or published OpenAPI specification — access is gated through GM/OnStar
  sales (developer.gm.com is a request-access endpoint) or via an authorized
  integration partner. Consumer-facing OnStar mobile features (remote start,
  remote lock, vehicle locate, in-vehicle Wi-Fi, Super Cruise telemetry) are
  delivered through GM's myChevrolet, myBuick, myGMC, and myCadillac apps and
  are not part of the published API surface.
